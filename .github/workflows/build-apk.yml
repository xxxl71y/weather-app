name: Build Android APK

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug

      - name: Sign APK
        working-directory: android
        run: |
          keytool -genkey -v -keystore weather.keystore -alias weather \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=Weather, OU=App, O=WeatherNow, L=Beijing, ST=Beijing, C=CN" \
            -noprompt
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore weather.keystore \
            -storepass android123 -keypass android123 \
            app/build/outputs/apk/debug/app-debug.apk weather
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 \
            app/build/outputs/apk/debug/app-debug.apk \
            weather.apk

      - name: Upload to Release
        if: github.event_name == 'release'
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            android/weather.apk \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/upload-artifact@v4
        with:
          name: weather-now-apk
          path: android/weather.apk
