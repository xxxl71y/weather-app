name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build APK
        working-directory: android
        run: gradle assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk WeatherNow-Android.apk

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: WeatherNow-Android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: WeatherNow-Android
          path: WeatherNow-Android.apk

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: python -m PyInstaller --onefile --noconsole --name Weather weather_app.py

      - name: Create ZIP package
        run: |
          $dest = "WeatherNow-Windows"
          New-Item -ItemType Directory -Path $dest -Force
          Copy-Item dist\Weather.exe "$dest\"
          Copy-Item index.html "$dest\"
          Copy-Item manifest.json "$dest\"
          Copy-Item sw.js "$dest\"
          Copy-Item icon.svg "$dest\"
          Compress-Archive -Path "$dest\*" -DestinationPath "WeatherNow-Windows.zip"

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: WeatherNow-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: WeatherNow-Windows
          path: WeatherNow-Windows.zip
