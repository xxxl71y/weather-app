<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg">
<title>天气查询</title>
<style>
  :root {
    --text: #fff;
    --text-secondary: rgba(255,255,255,0.65);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background 1.2s ease;
    overflow: hidden;
  }

  /* ===== 动态天气背景 ===== */
  body.sunny  { background: linear-gradient(160deg, #1a1a2e 0%, #1b3a4b 30%, #2d6a8a 60%, #e8a850 100%); }
  body.cloudy { background: linear-gradient(160deg, #1a1a2e 0%, #2d3a4a 40%, #5a6a7a 70%, #8a9aaa 100%); }
  body.rainy  { background: linear-gradient(160deg, #0d1117 0%, #1a2332 30%, #2d3f4f 60%, #4a5a6a 100%); }
  body.snowy  { background: linear-gradient(160deg, #1a1a2e 0%, #1e2d3d 30%, #c8d8e8 60%, #e8f0f8 100%); }
  body.stormy { background: linear-gradient(160deg, #0a0a14 0%, #141428 30%, #1e1e3c 60%, #282850 100%); }
  body.foggy  { background: linear-gradient(160deg, #1a1a2e 0%, #2a2a3e 30%, #4a4a5a 60%, #6a6a7a 100%); }

  /* ===== 雨滴画布 ===== */
  #rainCanvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }

  /* ===== 卡片 ===== */
  .card {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-radius: 32px;
    padding: 44px 40px;
    width: 400px;
    text-align: center;
    box-shadow:
      0 8px 32px rgba(0,0,0,0.12),
      0 2px 8px rgba(0,0,0,0.06),
      inset 0 1px 0 rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.12);
    animation: cardIn 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
    transition: transform 0.3s ease;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ===== 加载动画 ===== */
  .loader { display: none; margin: 40px auto; }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: rgba(255,255,255,0.8);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== 位置 ===== */
  .location-row {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-bottom: 2px;
  }
  .loc-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.5);
    flex-shrink: 0;
  }
  .loc-dot.ip { background: #facc15; box-shadow: 0 0 8px rgba(250,204,21,0.5); }
  .location { font-size: 24px; font-weight: 600; color: var(--text); letter-spacing: 0.5px; }
  .location-sub { font-size: 12px; opacity: 0.45; margin-bottom: 8px; letter-spacing: 0.3px; }

  /* ===== 天气主体 ===== */
  .weather-icon {
    font-size: 80px;
    margin: 12px 0 4px;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.15));
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }

  .temperature {
    font-size: 80px;
    font-weight: 200;
    letter-spacing: -3px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }
  .temp-unit { font-size: 28px; font-weight: 300; opacity: 0.55; vertical-align: super; }

  .description {
    font-size: 17px;
    font-weight: 400;
    opacity: 0.7;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  /* ===== 详情行 ===== */
  .details {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 28px 0 0;
    padding: 28px 0 0;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .detail-item {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 4px 0;
  }
  .detail-icon { font-size: 20px; opacity: 0.7; }
  .detail-value { font-size: 15px; font-weight: 600; color: var(--text); }
  .detail-label { font-size: 11px; opacity: 0.4; letter-spacing: 0.8px; }

  /* ===== 刷新按钮 ===== */
  .btn {
    margin-top: 28px;
    padding: 10px 28px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.25s ease;
    backdrop-filter: blur(10px);
  }
  .btn:hover {
    background: rgba(255,255,255,0.16);
    border-color: rgba(255,255,255,0.3);
    color: #fff;
    transform: translateY(-1px);
  }
  .btn:active { transform: scale(0.97); }

  /* ===== 错误 ===== */
  .error {
    color: #f87171;
    display: none;
    font-size: 13px;
    margin-top: 16px;
    padding: 8px 16px;
    background: rgba(248,113,113,0.1);
    border-radius: 10px;
    border: 1px solid rgba(248,113,113,0.15);
  }
</style>
</head>
<body class="cloudy">
<canvas id="rainCanvas"></canvas>

<div class="card">
  <div class="location-row">
    <span class="loc-dot" id="locDot"></span>
    <span class="location" id="location">获取位置中...</span>
  </div>
  <div class="location-sub" id="locSub"></div>
  <div class="loader" id="loader"><div class="spinner"></div></div>
  <div class="weather-icon" id="icon"></div>
  <div class="temperature" id="temp"></div>
  <div class="description" id="desc"></div>
  <div class="error" id="error"></div>
  <div class="details" id="details"></div>
  <button class="btn" onclick="fetchWeather()">↻ 刷新</button>
</div>

<script>
const WMO_CODES = {
  0:  { icon: '☀️',  desc: '晴天',      theme: 'sunny'  },
  1:  { icon: '🌤️', desc: '大部晴朗',   theme: 'sunny'  },
  2:  { icon: '⛅',  desc: '多云',       theme: 'cloudy' },
  3:  { icon: '☁️',  desc: '阴天',      theme: 'cloudy' },
  45: { icon: '🌫️', desc: '雾',         theme: 'foggy'  },
  48: { icon: '🌫️', desc: '雾凇',      theme: 'foggy'  },
  51: { icon: '🌦️', desc: '小毛毛雨',  theme: 'rainy'  },
  53: { icon: '🌦️', desc: '毛毛雨',    theme: 'rainy'  },
  55: { icon: '🌧️', desc: '大毛毛雨',  theme: 'rainy'  },
  56: { icon: '🌧️', desc: '冻毛毛雨',  theme: 'rainy'  },
  57: { icon: '🌧️', desc: '大冻毛毛雨', theme: 'rainy' },
  61: { icon: '🌧️', desc: '小雨',      theme: 'rainy'  },
  63: { icon: '🌧️', desc: '中雨',      theme: 'rainy'  },
  65: { icon: '🌧️', desc: '大雨',      theme: 'rainy'  },
  66: { icon: '🌧️', desc: '冻雨',      theme: 'rainy'  },
  67: { icon: '🌧️', desc: '大冻雨',    theme: 'rainy'  },
  71: { icon: '❄️',  desc: '小雪',      theme: 'snowy'  },
  73: { icon: '❄️',  desc: '中雪',      theme: 'snowy'  },
  75: { icon: '❄️',  desc: '大雪',      theme: 'snowy'  },
  77: { icon: '❄️',  desc: '雪粒',      theme: 'snowy'  },
  80: { icon: '🌧️', desc: '阵雨',      theme: 'rainy'  },
  81: { icon: '🌧️', desc: '中阵雨',    theme: 'rainy'  },
  82: { icon: '🌧️', desc: '大阵雨',    theme: 'rainy'  },
  85: { icon: '🌨️', desc: '小阵雪',    theme: 'snowy'  },
  86: { icon: '🌨️', desc: '大阵雪',    theme: 'snowy'  },
  95: { icon: '⛈️',  desc: '雷暴',      theme: 'stormy' },
  96: { icon: '⛈️',  desc: '雷暴伴小冰雹', theme: 'stormy' },
  99: { icon: '⛈️',  desc: '雷暴伴大冰雹', theme: 'stormy' },
};

/* ===== 雨/雪粒子 ===== */
const canvas = document.getElementById('rainCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animId;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function startParticles(theme) {
  cancelAnimationFrame(animId);
  particles = [];

  if (theme === 'rainy' || theme === 'stormy') {
    for (let i = 0; i < (theme === 'stormy' ? 180 : 100); i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        length: 8 + Math.random() * 16,
        speed: 8 + Math.random() * 14,
        opacity: 0.15 + Math.random() * 0.25,
      });
    }
  } else if (theme === 'snowy') {
    for (let i = 0; i < 80; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: 1 + Math.random() * 3,
        speed: 0.4 + Math.random() * 1.2,
        opacity: 0.4 + Math.random() * 0.5,
        wind: -0.3 + Math.random() * 0.6,
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (const p of particles) {
      ctx.beginPath();
      if (p.length !== undefined) {
        // 雨滴
        ctx.strokeStyle = `rgba(180,210,240,${p.opacity})`;
        ctx.lineWidth = 1;
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x, p.y + p.length);
        ctx.stroke();
        p.y += p.speed;
        if (p.y > canvas.height) {
          p.y = -p.length;
          p.x = Math.random() * canvas.width;
        }
      } else {
        // 雪花
        ctx.fillStyle = `rgba(255,255,255,${p.opacity})`;
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        p.y += p.speed;
        p.x += p.wind;
        if (p.y > canvas.height) {
          p.y = -p.r * 2;
          p.x = Math.random() * canvas.width;
        }
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
      }
    }

    if (particles.length) animId = requestAnimationFrame(draw);
  }
  if (particles.length) animId = requestAnimationFrame(draw);
}

function setTheme(theme) {
  document.body.className = theme;
  startParticles(theme);
}

async function fetchWeather() {
  const locEl    = document.getElementById('location');
  const locSubEl = document.getElementById('locSub');
  const locDotEl = document.getElementById('locDot');
  const loader   = document.getElementById('loader');
  const errorEl  = document.getElementById('error');
  const iconEl   = document.getElementById('icon');
  const tempEl   = document.getElementById('temp');
  const descEl   = document.getElementById('desc');
  const detailsEl = document.getElementById('details');

  locEl.textContent = '获取位置中...';
  locSubEl.textContent = '';
  locDotEl.className = 'loc-dot';
  errorEl.style.display = 'none';
  loader.style.display = 'block';
  iconEl.textContent = tempEl.textContent = descEl.textContent = '';
  detailsEl.innerHTML = '';

  let lat, lon, locName, locDetail, usingGPS = false;

  // 1. GPS 精确定位
  try {
    const pos = await new Promise((resolve, reject) => {
      if (!navigator.geolocation) return reject(new Error());
      navigator.geolocation.getCurrentPosition(
        resolve, reject,
        { timeout: 10000, enableHighAccuracy: true }
      );
    });
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;
    usingGPS = true;
  } catch (e) {
    try {
      const ipRes = await fetch('https://ipapi.co/json/');
      if (ipRes.ok) {
        const ipData = await ipRes.json();
        lat = ipData.latitude;
        lon = ipData.longitude;
        locName = ipData.city || ipData.region || '';
      }
    } catch (_) {}
  }

  if (lat == null || lon == null) {
    errorEl.style.display = 'block';
    errorEl.textContent = '无法获取位置，请检查网络后重试';
    locEl.textContent = '天气查询';
    loader.style.display = 'none';
    return;
  }

  // 2. 反向地理编码
  try {
    const geoUrl = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=zh-Hans`;
    const geoRes = await fetch(geoUrl);
    if (geoRes.ok) {
      const geo = await geoRes.json();
      const parts = [geo.countryName, geo.principalSubdivision, geo.city, geo.locality].filter(Boolean);
      const unique = [...new Set(parts)];
      locName = unique[unique.length - 1];
      locDetail = unique.join(' ');
    }
  } catch (_) {}

  locEl.textContent = locName || `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
  locDotEl.className = 'loc-dot' + (usingGPS ? '' : ' ip');
  locSubEl.textContent = (usingGPS ? 'GPS 精确定位' : 'IP 粗略定位') + (locDetail ? ' · ' + locDetail : '');

  // 3. 天气
  try {
    const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code,precipitation&timezone=auto`;
    const weatherRes = await fetch(weatherUrl);
    if (!weatherRes.ok) throw new Error(`HTTP ${weatherRes.status}`);
    const data = await weatherRes.json();
    const c = data.current;

    const wmo = WMO_CODES[c.weather_code] || { icon: '🌈', desc: '未知', theme: 'cloudy' };
    iconEl.textContent = wmo.icon;
    tempEl.innerHTML = `${Math.round(c.temperature_2m)}<span class="temp-unit">°C</span>`;
    descEl.textContent = wmo.desc;

    detailsEl.innerHTML = `
      <div class="detail-item">
        <span class="detail-icon">💧</span>
        <span class="detail-value">${c.relative_humidity_2m}%</span>
        <span class="detail-label">湿度</span>
      </div>
      <div class="detail-item">
        <span class="detail-icon">🌬️</span>
        <span class="detail-value">${c.wind_speed_10m} km/h</span>
        <span class="detail-label">风速</span>
      </div>
      <div class="detail-item">
        <span class="detail-icon">🌊</span>
        <span class="detail-value">${c.precipitation ?? 0} mm</span>
        <span class="detail-label">降水</span>
      </div>
    `;

    setTheme(wmo.theme);
  } catch (err) {
    errorEl.style.display = 'block';
    errorEl.textContent = `天气获取失败: ${err.message}`;
  }

  loader.style.display = 'none';
}

fetchWeather();

// PWA: 注册 Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
