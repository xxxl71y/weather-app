<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg">
<title>天气酱</title>
<link rel="stylesheet" href="src/styles.css">
</head>
<body class="cloudy">
<canvas id="rainCanvas"></canvas>

<div class="card">
  <button class="settings-btn" id="settingsBtn" onclick="toggleSettings()" title="设置">⚙</button>

  <div id="weatherView">
    <div class="location-row">
      <span class="loc-dot" id="locDot"></span>
      <span class="location" id="location">获取位置中...</span>
    </div>
    <div class="location-sub" id="locSub"></div>
    <div class="loader" id="loader"><div class="spinner"></div></div>
    <div class="weather-icon" id="icon"></div>
    <div class="temperature" id="temp"></div>
    <div class="description" id="desc"></div>
    <div class="error" id="error"></div>
    <div class="details" id="details"></div>
    <button class="btn" onclick="fetchWeatherFresh(true)">↻ 刷新</button>
    <div class="cache-age" id="cacheAge"></div>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <button class="settings-back" onclick="toggleSettings()">←</button>
      <span class="settings-title">设置</span>
    </div>

    <div class="setting-group">
      <div class="setting-group-label">显示</div>
      <div class="setting-row">
        <div>
          <div class="setting-label">温度单位</div>
          <div class="setting-hint">切换摄氏度与华氏度</div>
        </div>
        <div class="segmented" id="tempUnit">
          <button data-val="celsius" class="active">°C</button>
          <button data-val="fahrenheit">°F</button>
        </div>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-group-label">通知</div>
      <div class="setting-row">
        <div>
          <div class="setting-label">雨雪预测频率</div>
          <div class="setting-hint">后台预测雨雪的时间间隔</div>
        </div>
        <div class="alert-row">
          <button class="time-display" id="notifyIntervalBtn" onclick="openFreqPicker()">1 小时</button>
          <label class="toggle">
            <input type="checkbox" id="notifyIntervalOn" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">早间天气提醒</div>
          <div class="setting-hint">当天有雨雪时在此时间推送</div>
        </div>
        <div class="alert-row">
          <button class="time-display" id="notifyMorningBtn" onclick="openTimePicker('notifyMorning')">08:00</button>
          <label class="toggle">
            <input type="checkbox" id="notifyMorningOn" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">晚间天气提醒</div>
          <div class="setting-hint">明天有雨雪时在此时间推送</div>
        </div>
        <div class="alert-row">
          <button class="time-display" id="notifyEveningBtn" onclick="openTimePicker('notifyEvening')">23:00</button>
          <label class="toggle">
            <input type="checkbox" id="notifyEveningOn" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-group-label">数据</div>
      <div class="setting-row">
        <div>
          <div class="setting-label">自动刷新</div>
          <div class="setting-hint">打开应用时自动刷新天气</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="autoRefresh" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-group-label">关于</div>
      <div class="about-text">
        天气酱 <span id="appVersion"></span><br>
        基于 <a href="https://open-meteo.com/" target="_blank">Open-Meteo</a> 免费天气数据<br>
        <a href="https://github.com/xxxl71y/weather-app" target="_blank">GitHub</a>
      </div>
    </div>
  </div>
</div>

<div class="tp-overlay" id="tpOverlay" onclick="closeTimePicker()">
  <div class="tp-panel" onclick="event.stopPropagation()">
    <div class="tp-title">选择时间</div>
    <div class="tp-columns">
      <div class="tp-col" id="tpHours"></div>
      <div class="tp-colon">:</div>
      <div class="tp-col" id="tpMins"></div>
    </div>
    <button class="tp-done" onclick="closeTimePicker()">确定</button>
  </div>
</div>

<script src="src/weather-codes.js"></script>
<script src="src/particles.js"></script>
<script src="src/settings.js"></script>
<script src="src/cache.js"></script>
<script src="src/time-picker.js"></script>
<script src="src/app-core.js"></script>

</body>
</html>
